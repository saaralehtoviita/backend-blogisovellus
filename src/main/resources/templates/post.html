<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <title th:text="${post.title}">Postaus</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/omatyyli.css">
    <!--Yksittäisen postauksen sivu, sisältö vaihtuu postauksen id:n perusteella-->
</head>
<body>
    <div class="container mt-4">
    <h1 th:text="${post.title}"></h1>
    <p><strong>Date:</strong> <span th:text="${post.postDate}"></span></p>
    <hr>

    <div th:if="${images.size() == 1}">
    <!-- Yksi kuva → näytetään kuvan yläpuolella -->
    <img th:src="@{'/images/' + ${images[0].imgId}}" alt="Post image" class="postImage mb-3">
    <p th:utext="${post.text}"></p>
</div>

<div th:if="${images.size() > 1}" class="row">
    <!-- Useampi kuva → vasen kolumni kuville, oikea kolumni tekstille -->
    <div class="col-12 col-md-4">
        <div th:each="img : ${images}">
            <img th:src="@{'/images/' + ${img.imgId}}" alt="Post image" class="postImage mb-2">
        </div>
    </div>
    <div class="col-12 col-md-8">
        <p th:utext="${post.text}"></p>
    </div>
</div>

<div th:if="${images.size() == 0}">
    <!-- Ei kuvia -->
    <p th:utext="${post.text}"></p>
</div>
    <p><strong>Writer: </strong><span th:text="${post.writer.lastName + ', ' + post.writer.firstName}"></span></p>

    <p><strong>Keywords:</strong> 
        <span th:each="pk, stat : ${post.postKeywords}" 
        th:text="${pk.keyword.strKeyword + (stat.last ? '' : ', ')}"></span><p>
    <a href="/postlist" class="btn w-auto">Back to listing</a>
    <a sec:authorize="hasAuthority('USER')" th:href="@{/postlist_username/{userName}(userName=${post.writer.userName})}" class="btn w-auto">Back to your posts</a>
    <a sec:authorize="hasAuthority('ADMIN')" th:href="@{/postlistEdit}" class="btn w-auto">Back to admin main page</a>
    </div>   
</body>
</html>
